site_name: MolCrafts

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top

nav:
  - Home: 'index.md'
  - MolPy: '!include ./molpy/mkdocs.yml'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MolCrafts
  generator: false

plugins:
  - monorepo

markdown_extensions:
- pymdownx.arithmatex:
    generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

copyright: Copyright &copy; 2016 - 2024 Roy Kid